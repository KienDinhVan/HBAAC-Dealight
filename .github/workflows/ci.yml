name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check api scripts tests src dags

      - name: Unit and contract tests
        run: uv run pytest -q

      - name: Validate Compose definition
        run: docker compose --env-file .env.example -f infra/docker-compose.yml config --quiet
